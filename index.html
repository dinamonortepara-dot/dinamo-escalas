<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dínamo Engenharia - Gestão de Escalas</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="main-card">
  <div class="header">
    <img src="assets/img/logo.png" alt="Dínamo Logo" onerror="this.src='https://a.imagem.app/ojG4J2.md.png'">
    <h2>Gestão de Escalas e Equipes</h2>
  </div>

  <div class="tabs">
    <div class="tab active" data-target="painel">
      <i class="fas fa-tachometer-alt"></i> Painel de Controle
    </div>
    <div class="tab" data-target="gestaoEquipes">
      <i class="fas fa-users-cog"></i> Gestão de Equipes
    </div>
    <div class="tab" data-target="visaoGeral">
      <i class="fas fa-calendar-alt"></i> Calendário
    </div>
  </div>
  
  <div class="month-container">
    <div class="month-bar" id="barraMeses"></div>
  </div>

  <div id="painel" class="content active">
    <div id="statusArea">Carregando painel...</div>
  </div>

  <div id="gestaoEquipes" class="content">
    <div class="filter-container">
      <h3>Importação e Gestão</h3>
      <button class="btn-p" id="btnUploadExcel">
        <i class="fas fa-file-excel"></i> Importar Planilha (Excel)
      </button>
    </div>
    <div id="areaEquipes">Área de gerenciamento de equipes em construção...</div>
  </div>

  <div id="visaoGeral" class="content">
    <div class="filter-container">
      <select id="filtroTipo">
        <option value="">Selecione um Grupo...</option>
      </select>
      <button class="btn-p" id="btnAtualizar">
        <i class="fas fa-sync-alt"></i> Atualizar
      </button>
    </div>
    <div id="timelineArea" class="timeline-wrapper">
      <div style="text-align:center; color:#94a3b8; padding:60px;">
        <i class="fas fa-table" style="font-size:3rem; margin-bottom:15px; opacity:0.3"></i>
        <p>Selecione um grupo acima.</p>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
